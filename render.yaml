services:
  - type: web
    name: eld-trip-planner-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && gunicorn config.wsgi:application --config gunicorn.conf.py
    healthCheckPath: /api/healthz/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: eld-trip-planner-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://eld-trip-planner-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://eld-trip-planner-frontend.onrender.com,https://eld-trip-planner-backend.onrender.com
      - key: DJANGO_SECRET_KEY
        generateValue: true

  - type: web
    name: eld-trip-planner-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        value: https://eld-trip-planner-backend.onrender.com

